<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List — Synent Internship Task 3</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#f5f2eb;
    --surface:#fffef9;
    --surface2:#f0ede4;
    --border:rgba(0,0,0,0.09);
    --border2:rgba(0,0,0,0.15);
    --text:#1a1916;
    --muted:#8a8678;
    --accent:#2d6a4f;
    --accent-light:#e8f5ee;
    --accent-border:#b7dfca;
    --done-text:#8a8678;
    --danger:#c0392b;
    --danger-light:#fdf0ee;
    --yellow:#f5c842;
    --yellow-light:#fef9e7;
    --radius:10px;
  }

  body{
    background:var(--bg);
    min-height:100vh;
    font-family:'Instrument Sans',sans-serif;
    color:var(--text);
    padding:2.5rem 1rem 4rem;
  }

  /* Subtle paper texture lines */
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(0,0,0,0.04) 31px,rgba(0,0,0,0.04) 32px);
    pointer-events:none;z-index:0;
  }

  .page{position:relative;z-index:1;max-width:560px;margin:0 auto}

  /* Header */
  .header{margin-bottom:2rem}
  .brand{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem}
  .title{font-family:'Instrument Serif',serif;font-size:42px;line-height:1;color:var(--text);margin-bottom:.25rem}
  .title em{font-style:italic;color:var(--accent)}
  .subtitle{font-size:13px;color:var(--muted)}

  /* Stats row */
  .stats{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
    margin-bottom:1.5rem;
  }
  .stat{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:.75rem 1rem;
  }
  .stat-val{font-size:24px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
  .stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}

  /* Add task area */
  .add-area{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:1rem;
    margin-bottom:1.25rem;
    display:flex;flex-direction:column;gap:10px;
  }
  .add-row{display:flex;gap:8px}
  .task-input{
    flex:1;border:1px solid var(--border2);border-radius:8px;
    padding:.65rem .9rem;font-size:15px;
    font-family:'Instrument Sans',sans-serif;
    background:var(--bg);color:var(--text);outline:none;
    transition:border-color .2s;
  }
  .task-input:focus{border-color:var(--accent)}
  .task-input::placeholder{color:var(--muted)}

  .cat-row{display:flex;gap:6px;flex-wrap:wrap}
  .cat-btn{
    font-size:12px;padding:4px 12px;border-radius:99px;
    border:1px solid var(--border2);background:transparent;
    color:var(--muted);cursor:pointer;transition:all .15s;
    font-family:'Instrument Sans',sans-serif;
  }
  .cat-btn:hover{background:var(--surface2)}
  .cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  .add-btn{
    background:var(--accent);color:#fff;border:none;
    border-radius:8px;padding:.65rem 1.1rem;
    font-size:15px;font-weight:600;cursor:pointer;
    font-family:'Instrument Sans',sans-serif;
    transition:all .15s;white-space:nowrap;
  }
  .add-btn:hover{background:#245c43}
  .add-btn:active{transform:scale(.97)}

  /* Filter tabs */
  .filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
  .filter-btn{
    font-size:12px;padding:5px 14px;border-radius:99px;
    border:1px solid var(--border2);background:transparent;
    color:var(--muted);cursor:pointer;transition:all .15s;
    font-family:'Instrument Sans',sans-serif;
  }
  .filter-btn:hover{background:var(--surface)}
  .filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

  /* Task list */
  .task-list{display:flex;flex-direction:column;gap:8px}

  .task-item{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:.85rem 1rem;
    display:flex;align-items:flex-start;gap:.75rem;
    transition:all .2s;animation:slideIn .2s ease;
  }
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

  .task-item.done-item{background:var(--surface2);border-color:var(--border)}
  .task-item:hover{border-color:var(--border2)}

  .check-btn{
    width:22px;height:22px;border-radius:50%;flex-shrink:0;
    border:2px solid var(--border2);background:transparent;
    cursor:pointer;transition:all .2s;margin-top:1px;
    display:flex;align-items:center;justify-content:center;
  }
  .check-btn:hover{border-color:var(--accent);background:var(--accent-light)}
  .check-btn.checked{background:var(--accent);border-color:var(--accent)}
  .check-icon{display:none;color:#fff;font-size:12px;font-weight:700}
  .check-btn.checked .check-icon{display:block}

  .task-body{flex:1;min-width:0}
  .task-title{font-size:15px;color:var(--text);line-height:1.4;word-break:break-word}
  .task-title.striked{text-decoration:line-through;color:var(--done-text)}
  .task-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
  .task-date{font-size:11px;color:var(--muted)}
  .task-cat{font-size:11px;padding:1px 8px;border-radius:99px;font-weight:500}
  .cat-work{background:#e8f0fe;color:#1a56db}
  .cat-personal{background:#fce7f3;color:#9d174d}
  .cat-study{background:#ecfdf5;color:#065f46}
  .cat-other{background:#f3f4f6;color:#374151}

  .del-btn{
    background:none;border:none;cursor:pointer;
    color:var(--muted);font-size:16px;padding:2px 4px;
    border-radius:6px;transition:all .15s;flex-shrink:0;
    line-height:1;margin-top:1px;
  }
  .del-btn:hover{background:var(--danger-light);color:var(--danger)}

  /* Empty state */
  .empty{
    text-align:center;padding:3rem 1rem;
    font-family:'Instrument Serif',serif;font-size:20px;
    color:var(--muted);font-style:italic;
  }

  /* Clear completed */
  .bottom-bar{
    margin-top:1rem;display:flex;align-items:center;justify-content:space-between;
    font-size:12px;color:var(--muted);
  }
  .clear-btn{
    background:none;border:none;font-size:12px;color:var(--muted);
    cursor:pointer;font-family:'Instrument Sans',sans-serif;
    text-decoration:underline;transition:color .15s;padding:0;
  }
  .clear-btn:hover{color:var(--danger)}

  .footer{margin-top:2.5rem;text-align:center;font-size:11px;color:var(--muted);letter-spacing:.05em}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="brand">Synent Technologies · Task 3</div>
    <div class="title">My <em>Tasks</em></div>
    <div class="subtitle">Your tasks are saved automatically in the browser</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="st-total">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val" id="st-pending">0</div><div class="stat-lbl">Pending</div></div>
    <div class="stat"><div class="stat-val" id="st-done">0</div><div class="stat-lbl">Done</div></div>
  </div>

  <div class="add-area">
    <div class="add-row">
      <input class="task-input" id="task-input" type="text" placeholder="What needs to be done?" maxlength="120" />
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
    <div class="cat-row">
      <span style="font-size:12px;color:var(--muted);align-self:center">Category:</span>
      <button class="cat-btn active" onclick="selectCat(this,'work')">Work</button>
      <button class="cat-btn" onclick="selectCat(this,'personal')">Personal</button>
      <button class="cat-btn" onclick="selectCat(this,'study')">Study</button>
      <button class="cat-btn" onclick="selectCat(this,'other')">Other</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter(this,'all')">All</button>
    <button class="filter-btn" onclick="setFilter(this,'pending')">Pending</button>
    <button class="filter-btn" onclick="setFilter(this,'done')">Completed</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="bottom-bar">
    <span id="bottom-msg"></span>
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>

  <div class="footer">synent-task3-todolist · open in any browser · no install needed</div>
</div>

<script>
  var tasks = JSON.parse(localStorage.getItem('synent-tasks') || '[]');
  var currentFilter = 'all';
  var currentCat = 'work';

  function save() { localStorage.setItem('synent-tasks', JSON.stringify(tasks)); }

  function selectCat(el, cat) {
    document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');
    currentCat = cat;
  }

  function setFilter(el, f) {
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    el.classList.add('active');
    currentFilter = f;
    render();
  }

  function addTask() {
    var input = document.getElementById('task-input');
    var title = input.value.trim();
    if (!title) { input.focus(); return; }
    tasks.unshift({
      id: Date.now(),
      title: title,
      done: false,
      cat: currentCat,
      created: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),
      doneAt: null
    });
    save();
    input.value = '';
    input.focus();
    render();
  }

  function toggle(id) {
    var t = tasks.find(function(x){ return x.id === id; });
    if (!t) return;
    t.done = !t.done;
    t.doneAt = t.done ? new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : null;
    save(); render();
  }

  function del(id) {
    tasks = tasks.filter(function(x){ return x.id !== id; });
    save(); render();
  }

  function clearDone() {
    tasks = tasks.filter(function(x){ return !x.done; });
    save(); render();
  }

  function catClass(cat) {
    var map = {work:'cat-work',personal:'cat-personal',study:'cat-study',other:'cat-other'};
    return map[cat] || 'cat-other';
  }

  function render() {
    var filtered = tasks.filter(function(t){
      if (currentFilter === 'pending') return !t.done;
      if (currentFilter === 'done') return t.done;
      return true;
    });

    var list = document.getElementById('task-list');
    var done = tasks.filter(function(t){ return t.done; }).length;
    var pending = tasks.length - done;

    document.getElementById('st-total').textContent = tasks.length;
    document.getElementById('st-pending').textContent = pending;
    document.getElementById('st-done').textContent = done;
    document.getElementById('bottom-msg').textContent = done + ' task' + (done===1?'':'s') + ' completed';

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">Nothing here yet — add a task above</div>';
      return;
    }

    list.innerHTML = filtered.map(function(t) {
      return '<div class="task-item' + (t.done?' done-item':'') + '">' +
        '<button class="check-btn' + (t.done?' checked':'') + '" onclick="toggle(' + t.id + ')">' +
          '<span class="check-icon">✓</span>' +
        '</button>' +
        '<div class="task-body">' +
          '<div class="task-title' + (t.done?' striked':'') + '">' + escHtml(t.title) + '</div>' +
          '<div class="task-meta">' +
            '<span class="task-date">' + (t.done && t.doneAt ? 'Done ' + t.doneAt : 'Added ' + t.created) + '</span>' +
            '<span class="task-cat ' + catClass(t.cat) + '">' + t.cat + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="del-btn" onclick="del(' + t.id + ')" title="Delete">✕</button>' +
      '</div>';
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('task-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
